<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LeetSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: rgba(30,31,37,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      color: #f4f4f5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      margin: 0; /* Important for popup border radius */
    }

    /* Header */
    .popup-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .popup-logo {
      font-weight: 700;
      font-size: 20px;
      color: #f4f4f5;
    }
    .popup-logo .bracket { color: #f4f4f5; }
    .popup-logo .name { color: #f4f4f5; margin: 0 3px; }
    .popup-tagline {
      font-size: 12px;
      color: #a1a1aa;
      font-weight: 500;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 8px 16px 16px;
    }
    .stat-card {
      background: #2b2d35;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      transition: 0.2s ease;
    }
    .stat-card:hover { 
      transform: translateY(-2px); 
    }
    .stat-label {
      font-size: 10px;
      color: #a1a1aa;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card.blue .stat-value { color: #5EA1FF; }
    .stat-card.purple .stat-value { color: #9C7CFF; }
    .stat-card.amber .stat-value { color: #F59E0B; }
    .stat-card.green .stat-value { color: #4ADE80; }

    /* Heatmap section */
    .heatmap-section {
      padding: 4px 16px 16px;
    }
    .heatmap-title {
      font-size: 10px;
      font-weight: 600;
      color: #a1a1aa;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    #heatmap {
      display: flex;
      gap: 3px;
    }
    .hm-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .hm-cell {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: #26272d;
      cursor: default;
      transition: 0.15s ease;
    }
    .hm-cell:hover { transform: scale(1.1); }
    .hm-cell[data-level="1"] { background: #2D5FFF; }
    .hm-cell[data-level="2"] { background: #4D78FF; }
    .hm-cell[data-level="3"] { background: #6D95FF; }
    .hm-cell[data-level="4"] { background: #8FB2FF; }

    /* Legend */
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      justify-content: flex-end;
    }
    .legend-label {
      font-size: 10px;
      font-weight: 500;
      color: #a1a1aa;
    }
    .legend-cell {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* Footer */
    .popup-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-hint {
      font-size: 12px;
      color: #8b8b95;
      font-weight: 500;
    }
    .footer-link {
      font-size: 12px;
      color: #8b8b95;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s ease;
    }
    .footer-link:hover { color: #5EA1FF; }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <span class="bracket">[</span>
      <span class="name">LeetSense</span>
      <span class="bracket">]</span>
    </div>
    <span class="popup-tagline">your progress</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="stat-label">Problems</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="stat-streak">0</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">This week</div>
      <div class="stat-value" id="stat-week">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Snapshots</div>
      <div class="stat-value" id="stat-snaps">0</div>
    </div>
  </div>

  <div class="heatmap-section">
    <div class="heatmap-title">Activity · last 13 weeks</div>
    <div id="heatmap"></div>
    <div class="heatmap-legend">
      <span class="legend-label">less</span>
      <div class="legend-cell" style="background:#26272d"></div>
      <div class="legend-cell" style="background:#2D5FFF"></div>
      <div class="legend-cell" style="background:#4D78FF"></div>
      <div class="legend-cell" style="background:#6D95FF"></div>
      <div class="legend-cell" style="background:#8FB2FF"></div>
      <span class="legend-label">more</span>
    </div>
  </div>

  <div class="popup-footer">
    <span class="footer-hint">// hover cells for details</span>
    <a class="footer-link" href="https://leetcode.com" target="_blank">open leetcode →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
