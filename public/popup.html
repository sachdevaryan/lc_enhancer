<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LeetSense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #080B14;
      color: #c8d6e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* Top gradient bar */
    .glow-bar {
      height: 2px;
      background: linear-gradient(90deg, #7B61FF, #00D4FF, #7B61FF);
      background-size: 200% 100%;
      animation: slide 3s linear infinite;
    }
    @keyframes slide {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* Header */
    .popup-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(0,212,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .popup-logo {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 13px;
    }
    .popup-logo .bracket { color: #7B61FF; }
    .popup-logo .name { color: #00D4FF; margin: 0 3px; }
    .popup-tagline {
      font-size: 10px;
      color: rgba(0,212,255,0.35);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 14px;
    }
    .stat-card {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(0,212,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: rgba(0,212,255,0.25); }
    .stat-label {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(200,214,229,0.35);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: #00D4FF;
      line-height: 1;
    }
    .stat-card.purple .stat-value { color: #7B61FF; }
    .stat-card.amber .stat-value { color: #FFB000; }
    .stat-card.green .stat-value { color: #22c55e; }

    /* Heatmap section */
    .heatmap-section {
      padding: 4px 14px 14px;
    }
    .heatmap-title {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(200,214,229,0.3);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #heatmap {
      display: flex;
      gap: 3px;
    }
    .hm-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .hm-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.08);
      cursor: default;
      transition: transform 0.1s;
    }
    .hm-cell:hover { transform: scale(1.3); }
    .hm-cell[data-level="1"] { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.2); }
    .hm-cell[data-level="2"] { background: rgba(0,212,255,0.3); border-color: rgba(0,212,255,0.35); }
    .hm-cell[data-level="3"] { background: rgba(0,212,255,0.55); border-color: rgba(0,212,255,0.6); }
    .hm-cell[data-level="4"] { background: #00D4FF; border-color: #00D4FF; box-shadow: 0 0 6px rgba(0,212,255,0.4); }

    /* Legend */
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      justify-content: flex-end;
    }
    .legend-label {
      font-size: 9px;
      color: rgba(200,214,229,0.25);
      font-family: 'JetBrains Mono', monospace;
    }
    .legend-cell {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* Footer */
    .popup-footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(0,212,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-hint {
      font-size: 10px;
      color: rgba(200,214,229,0.2);
      font-family: 'JetBrains Mono', monospace;
    }
    .footer-link {
      font-size: 10px;
      color: rgba(0,212,255,0.4);
      font-family: 'JetBrains Mono', monospace;
      text-decoration: none;
      cursor: pointer;
    }
    .footer-link:hover { color: #00D4FF; }
  </style>
</head>
<body>
  <div class="glow-bar"></div>

  <div class="popup-header">
    <div class="popup-logo">
      <span class="bracket">[</span>
      <span class="name">LeetSense</span>
      <span class="bracket">]</span>
    </div>
    <span class="popup-tagline">your progress</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Problems</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="stat-streak">0</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">This week</div>
      <div class="stat-value" id="stat-week">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Snapshots</div>
      <div class="stat-value" id="stat-snaps">0</div>
    </div>
  </div>

  <div class="heatmap-section">
    <div class="heatmap-title">Activity · last 13 weeks</div>
    <div id="heatmap"></div>
    <div class="heatmap-legend">
      <span class="legend-label">less</span>
      <div class="legend-cell" style="background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.08)"></div>
      <div class="legend-cell" style="background:rgba(0,212,255,0.15)"></div>
      <div class="legend-cell" style="background:rgba(0,212,255,0.3)"></div>
      <div class="legend-cell" style="background:rgba(0,212,255,0.55)"></div>
      <div class="legend-cell" style="background:#00D4FF"></div>
      <span class="legend-label">more</span>
    </div>
  </div>

  <div class="popup-footer">
    <span class="footer-hint">// hover cells for details</span>
    <a class="footer-link" href="https://leetcode.com" target="_blank">open leetcode →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
